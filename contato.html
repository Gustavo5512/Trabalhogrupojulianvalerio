<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoVolt | Solicitar Orçamento</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepblue: '#0B132B',
                        sunset: '#FF6B35',
                        sunyellow: '#FFB703',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; }

        /* Navbar */
        .solid-nav { background-color: rgba(11, 19, 43, 0.95); backdrop-filter: blur(10px); }
        .nav-links-container::-webkit-scrollbar { display: none; }

        /* Fundo com Imagem + Mesh Gradient Animado */
        .mesh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://images.unsplash.com/photo-1509391366360-12009a308569?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .mesh-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(16, 185, 129, 0.4), transparent),
                        radial-gradient(circle at 80% 70%, rgba(11, 19, 43, 0.8), transparent);
            animation: moveMesh 15s infinite alternate ease-in-out;
        }

        @keyframes moveMesh {
            0% { transform: scale(1.1) rotate(0deg); }
            100% { transform: scale(1.3) rotate(5deg); }
        }

        /* Inputs Estilizados */
        .input-group { position: relative; }
        .input-field {
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            padding: 1rem 0;
            color: white;
            transition: border-color 0.3s;
            outline: none;
        }

        .input-line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #FFB703;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus + .input-line { width: 100%; }
        .input-field:focus { border-color: transparent; }

        /* Animação do Botão */
        .send-icon { animation: energyPulse 1.5s infinite alternate; }
        @keyframes energyPulse {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Background Animado -->
    <div class="mesh-container">
        <div class="mesh-overlay"></div>
    </div>

    <!-- NAVEGAÇÃO -->
    <nav class="fixed top-0 left-0 w-full z-50 solid-nav transition-all duration-300 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="index.html" class="flex items-center gap-2">
                    <svg class="h-8 w-8 text-sunset" fill="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    <span class="text-white text-2xl font-bold">Neo<span class="font-light text-gray-300">Volt</span></span>
                </a>
                <div class="flex-1 overflow-hidden flex justify-end">
                    <div class="nav-links-container flex items-center space-x-6 overflow-x-auto whitespace-nowrap pl-4 pr-2">
                        <a href="index.html" class="text-gray-400 hover:text-white py-2 text-sm font-medium">Home</a>
                        <a href="sobre.html" class="text-gray-400 hover:text-white py-2 text-sm font-medium">Sobre</a>
                        <a href="catalogo.html" class="text-gray-400 hover:text-white py-2 text-sm font-medium">Catálogo</a>
                        <a href="serviços.html" class="text-gray-400 hover:text-white py-2 text-sm font-medium">Serviços</a>
                        <a href="galeria.html" class="text-gray-400 hover:text-white py-2 text-sm font-medium">Galeria</a>
                        <a href="contato.html" class="text-white hover:text-emerald-400 py-2 text-sm font-medium border-b-2 border-emerald-400">Contato</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="min-h-screen flex items-center justify-center px-6 pt-20">
        <div class="w-full max-w-lg bg-black/40 backdrop-blur-md p-8 md:p-12 rounded-3xl border border-white/10 shadow-2xl">
            <h1 class="text-4xl font-extrabold text-white mb-2">Vamos conversar?</h1>
            <p class="text-gray-300 mb-10">Preencha os dados e nossa engenharia entrará em contato.</p>
            
            <form action="#" class="space-y-8">
                <div class="input-group">
                    <input type="text" placeholder="Nome Completo" class="input-field">
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Seu melhor e-mail" class="input-field">
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Média de consumo (Watts)" class="input-field">
                    <div class="input-line"></div>
                </div>

                <button type="button" onclick="window.location.href='https://wa.me/5589994375818'" class="w-full bg-sunset hover:bg-orange-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 group">
                    <span>Enviar solicitação</span>
                    <svg class="w-6 h-6 send-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-8 text-center border-t border-white/10 pt-8">
                <p class="text-gray-400 text-sm">Ou fale diretamente pelo WhatsApp:</p>
                <a href="https://wa.me/5589994375818" class="text-emerald-400 font-bold text-lg hover:underline">(89) 99437-5818</a>
            </div>
        </div>
    </main>

</body>
</html>
